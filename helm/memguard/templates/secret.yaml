{{- if and .Values.memguardCloud.apiKey (not .Values.memguardCloud.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memguard.fullname" . }}-cloud-secret
  labels:
    {{- include "memguard.labels" . | nindent 4 }}
type: Opaque
stringData:
  MEMGUARD_API_KEY: {{ .Values.memguardCloud.apiKey | quote }}
{{- end }}
{{- if and .Values.vllm.hfToken (not .Values.vllm.existingHfSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memguard.fullname" . }}-hf-secret
  labels:
    {{- include "memguard.labels" . | nindent 4 }}
type: Opaque
stringData:
  HF_TOKEN: {{ .Values.vllm.hfToken | quote }}
{{- end }}
