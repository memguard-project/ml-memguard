{{- if .Values.patchExistingDeployment.enabled }}
{{- $targetNs   := include "memguard.patchTargetNamespace" . }}
{{- $targetDep  := required "patchExistingDeployment.targetDeployment is required when patchExistingDeployment.enabled=true" .Values.patchExistingDeployment.targetDeployment }}
{{- $container  := .Values.patchExistingDeployment.containerName }}
{{- $sidecarPort := .Values.sidecar.port }}
# ---------------------------------------------------------------------------
# Bring-your-own-vLLM readiness gate
#
# This template handles the case where the user already has a vLLM Deployment
# that was NOT deployed via this chart and wants to inject the memguard
# /readyz readinessProbe without redeploying.
#
# Kubernetes control-plane behavior (documented here for operator reference):
#
#   1. Sidecar polls vLLM /metrics every pollInterval seconds.
#   2. KVCacheMonitor computes oom_probability from KV cache utilization,
#      velocity, fragmentation, and eviction rate.
#   3. When oom_probability > shedThreshold, /readyz returns HTTP 503.
#   4. Kubernetes kubelet detects the 503 (failureThreshold: 1) and marks
#      the pod NotReady immediately — no grace period.
#   5. kube-proxy removes the pod's IP from the Service Endpoints slice.
#      iptables / ipvs rules are updated on all nodes within ~1s.
#   6. The load balancer (Ingress, Gateway API, or cloud LB) stops routing
#      new connections to this pod within the next health-check cycle.
#   7. In-flight requests continue to execute — the pod is not killed.
#      vLLM drains existing sequences to completion.
#   8. If VLLMWatchdog is running, it detects the OOM state and schedules
#      a graceful restart during the quiet window after drain completes.
#   9. After restart, /readyz returns 200 → pod re-enters the endpoint set
#      → traffic resumes automatically. No manual intervention required.
#
# What this Job does:
#   Runs kubectl strategic-merge-patch on the target Deployment to inject:
#     - readinessProbe → httpGet /readyz :{{ $sidecarPort }}  failureThreshold: 1
#   The patch is idempotent — safe to run on upgrade.
# ---------------------------------------------------------------------------

# RBAC — ClusterRole with patch rights on the target Deployment
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "memguard.fullname" . }}-patch
  labels:
    {{- include "memguard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
    resourceNames: [{{ $targetDep | quote }}]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "memguard.fullname" . }}-patch
  labels:
    {{- include "memguard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "memguard.fullname" . }}-patch
subjects:
  - kind: ServiceAccount
    name: {{ include "memguard.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Post-install Job — applies the readinessProbe patch to the target Deployment
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "memguard.fullname" . }}-probe-patch
  labels:
    {{- include "memguard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "memguard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: probe-patch-job
    spec:
      serviceAccountName: {{ include "memguard.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: kubectl-patch
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              echo "[memguard] Patching readinessProbe on deployment/{{ $targetDep }} in namespace {{ $targetNs }}"
              kubectl patch deployment {{ $targetDep }} \
                --namespace {{ $targetNs }} \
                --type=strategic \
                --patch '{
                  "spec": {
                    "template": {
                      "spec": {
                        "containers": [{
                          "name": {{ $container | quote }},
                          "readinessProbe": {
                            "httpGet": {
                              "path": "/readyz",
                              "port": {{ $sidecarPort }}
                            },
                            "initialDelaySeconds": 30,
                            "periodSeconds": 10,
                            "timeoutSeconds": 5,
                            "failureThreshold": 1
                          }
                        }]
                      }
                    }
                  }
                }'
              echo "[memguard] Patch applied. Verifying..."
              kubectl rollout status deployment/{{ $targetDep }} \
                --namespace {{ $targetNs }} \
                --timeout=120s
              echo "[memguard] Done. Pod readiness now gated by memguard /readyz."
{{- end }}
