version: "3.9"

# memguard vLLM quickstart
#
# Spins up:
#   - vllm:8000     — vLLM OpenAI-compatible inference server
#   - sidecar:8001  — memguard sidecar (/healthz and /readyz for k8s probes)
#
# Usage:
#   cp .env.example .env   # fill in MODEL_NAME, HF_TOKEN
#   docker compose up
#
# Test endpoints:
#   curl http://localhost:8000/health          # vLLM liveness
#   curl http://localhost:8001/healthz         # sidecar liveness (always 200)
#   curl http://localhost:8001/readyz          # sidecar readiness (503 under OOM risk)

services:

  # ---------------------------------------------------------------------------
  # vLLM inference server
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN}"
    command: >
      --model ${MODEL_NAME}
      --host 0.0.0.0
      --port 8000
      --enable-prefix-caching
      --max-model-len 4096
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    # GPU access (remove this section if running CPU-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # memguard sidecar
  # ---------------------------------------------------------------------------
  sidecar:
    image: python:3.11-slim
    ports:
      - "${SIDECAR_PORT:-8001}:8001"
    # Install ml-memguard, then start the sidecar.
    # Polls vLLM's /metrics endpoint every MEMGUARD_POLL_INTERVAL seconds
    # and exposes /healthz + /readyz on port 8001.
    command: >
      sh -c "pip install ml-memguard --quiet --no-cache-dir &&
             python -m memory_guard.sidecar
               --vllm-url      http://vllm:8000
               --host          0.0.0.0
               --port          8001
               --threshold     ${MEMGUARD_SHED_THRESHOLD:-0.70}
               --poll-interval ${MEMGUARD_POLL_INTERVAL:-5.0}
               --model-name    '${MODEL_NAME}'"
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  huggingface-cache:
